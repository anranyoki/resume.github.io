<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>投递助手</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F6F3;
    --surface: #FFFFFF;
    --surface2: #F0EDE8;
    --border: #E2DDD8;
    --border2: #C8C3BC;
    --text: #1C1A17;
    --text2: #6B6560;
    --text3: #9C9792;
    --accent: #2D5A27;
    --accent-bg: #EEF5ED;
    --accent-text: #1F4019;
    --warn: #8B4513;
    --warn-bg: #FDF3EC;
    --danger: #8B1A1A;
    --danger-bg: #FDF0F0;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.6;
  }

  .layout {
    max-width: 900px;
    margin: 0 auto;
    padding: 2.5rem 2rem 4rem;
  }

  header { margin-bottom: 2.5rem; }
  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 26px;
    color: var(--text);
    letter-spacing: -0.5px;
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
  .logo-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; display: inline-block; margin-bottom: 2px; }
  .tagline { font-size: 13px; color: var(--text3); margin-top: 4px; }

  /* API Key bar */
  .api-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 1.5rem;
    overflow: hidden;
  }
  .api-provider-row {
    display: flex; border-bottom: 1px solid var(--border);
    padding: 10px 16px; gap: 8px; align-items: center;
  }
  .api-provider-label { font-size: 12px; color: var(--text2); font-weight: 500; margin-right: 4px; }
  .provider-btn {
    padding: 4px 12px; border-radius: 20px; font-size: 12px;
    border: 1px solid var(--border); background: transparent;
    color: var(--text2); cursor: pointer; font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
  }
  .provider-btn:hover { border-color: var(--border2); color: var(--text); }
  .provider-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }
  .api-bar {
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .api-bar label { font-size: 12px; color: var(--text2); white-space: nowrap; font-weight: 500; }
  .api-bar input {
    flex: 1; border: none; background: transparent;
    font-size: 13px; color: var(--text); outline: none; font-family: monospace;
  }
  .api-status { font-size: 11px; padding: 3px 8px; border-radius: 20px; white-space: nowrap; }
  .api-status.set { background: var(--accent-bg); color: var(--accent-text); }
  .api-status.unset { background: var(--warn-bg); color: var(--warn); }

  .main-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-bottom: 1rem;
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .panel-header {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .panel-title { font-size: 12px; font-weight: 500; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; }
  .char-count { font-size: 11px; color: var(--text3); }

  textarea {
    width: 100%; height: 240px; border: none; resize: none;
    font-family: 'DM Sans', sans-serif; font-size: 14px;
    color: var(--text); background: transparent;
    padding: 14px; line-height: 1.7; outline: none;
  }
  textarea::placeholder { color: var(--text3); }

  .options-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }
  .options-label { font-size: 12px; color: var(--text2); font-weight: 500; white-space: nowrap; }

  .type-group { display: flex; gap: 6px; flex: 1; flex-wrap: wrap; }
  .type-btn {
    padding: 6px 14px; border-radius: 20px; font-size: 13px;
    border: 1px solid var(--border); background: transparent;
    color: var(--text2); cursor: pointer; font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
  }
  .type-btn:hover { border-color: var(--border2); color: var(--text); }
  .type-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }

  .lang-group { display: flex; gap: 6px; }

  .generate-row { display: flex; gap: 10px; }
  .btn-gen {
    flex: 1; padding: 13px;
    background: var(--text); color: var(--bg);
    border: none; border-radius: 10px;
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
    cursor: pointer; transition: opacity 0.15s;
  }
  .btn-gen:hover { opacity: 0.85; }
  .btn-gen:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn-clear {
    padding: 13px 18px; border-radius: 10px;
    background: transparent; color: var(--text2);
    border: 1px solid var(--border); cursor: pointer;
    font-family: 'DM Sans', sans-serif; font-size: 13px;
  }
  .btn-clear:hover { background: var(--surface2); }

  /* Output */
  .output-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-top: 1rem;
    display: none;
  }
  .output-header {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
    background: var(--surface2);
  }
  .output-title { font-size: 12px; font-weight: 500; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; }
  .output-actions { display: flex; gap: 6px; }
  .btn-sm {
    padding: 4px 12px; border-radius: 6px; font-size: 12px;
    border: 1px solid var(--border2); background: var(--surface);
    color: var(--text2); cursor: pointer; font-family: 'DM Sans', sans-serif;
  }
  .btn-sm:hover { background: var(--bg); }

  .loading-area {
    padding: 28px; display: none; align-items: center; gap: 14px;
  }
  .spinner {
    width: 18px; height: 18px; flex-shrink: 0;
    border: 2px solid var(--border); border-top-color: var(--text2);
    border-radius: 50%; animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 13px; color: var(--text2); }

  /* Analysis cards */
  .stats-row {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
    padding: 14px; display: none;
  }
  .stat-card { background: var(--surface2); border-radius: 8px; padding: 10px 14px; }
  .stat-label { font-size: 11px; color: var(--text3); margin-bottom: 3px; }
  .stat-value { font-size: 22px; font-weight: 500; }
  .stat-value.good { color: var(--accent); }
  .stat-value.ok { color: #785800; }
  .stat-value.bad { color: var(--danger); }

  .tabs-bar {
    display: flex; border-bottom: 1px solid var(--border);
    padding: 0 14px; display: none;
  }
  .tab {
    padding: 9px 14px; font-size: 13px; background: none; border: none;
    color: var(--text2); cursor: pointer; border-bottom: 2px solid transparent;
    margin-bottom: -1px; font-family: 'DM Sans', sans-serif;
  }
  .tab.active { color: var(--text); border-bottom-color: var(--text); }

  .output-body {
    padding: 18px 20px; font-size: 14px; line-height: 1.85;
    color: var(--text); white-space: pre-wrap;
    max-height: 560px; overflow-y: auto;
  }
  .error-area { padding: 16px 20px; font-size: 13px; color: var(--danger); display: none; }

  /* Scrollbar */
  .output-body::-webkit-scrollbar { width: 6px; }
  .output-body::-webkit-scrollbar-track { background: transparent; }
  .output-body::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  @media (max-width: 600px) {
    .main-grid { grid-template-columns: 1fr; }
    .layout { padding: 1.5rem 1rem 3rem; }
  }
</style>
</head>
<body>
<div class="layout">

  <header>
    <div class="logo">
      <span class="logo-dot"></span>
      投递助手
    </div>
    <p class="tagline">粘贴 JD + 简历，一键生成定制材料</p>
  </header>

  <div class="api-section">
    <div class="api-provider-row">
      <span class="api-provider-label">模型</span>
      <button class="provider-btn active" data-provider="anthropic" onclick="selectProvider(this)">Claude</button>
      <button class="provider-btn" data-provider="openai" onclick="selectProvider(this)">GPT-4o</button>
      <button class="provider-btn" data-provider="gemini" onclick="selectProvider(this)">Gemini</button>
      <button class="provider-btn" data-provider="deepseek" onclick="selectProvider(this)">DeepSeek</button>
      <button class="provider-btn" data-provider="grok" onclick="selectProvider(this)">Grok</button>
    </div>
    <div class="api-bar">
      <label id="api-label">Anthropic API Key</label>
      <input type="password" id="api-key" placeholder="sk-ant-..." oninput="updateApiStatus()" />
      <span class="api-status unset" id="api-status">未填写</span>
    </div>
  </div>

  <div class="main-grid">
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">职位描述 (JD)</span>
        <span class="char-count" id="jd-count">0 字</span>
      </div>
      <textarea id="jd" placeholder="粘贴完整 JD，包含职责、要求、技能描述等..." oninput="updateCount('jd','jd-count')"></textarea>
    </div>
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">我的简历</span>
        <span class="char-count" id="resume-count">0 字</span>
      </div>
      <textarea id="resume" placeholder="粘贴简历文本，包含工作经历、技能、教育背景等..." oninput="updateCount('resume','resume-count')"></textarea>
    </div>
  </div>

  <div class="options-row">
    <span class="options-label">生成类型</span>
    <div class="type-group">
      <button class="type-btn active" data-type="resume" onclick="selectType(this)">简历优化</button>
      <button class="type-btn" data-type="cover" onclick="selectType(this)">Cover Letter</button>
      <button class="type-btn" data-type="analysis" onclick="selectType(this)">匹配分析</button>
    </div>
    <span class="options-label">语言</span>
    <div class="lang-group">
      <button class="type-btn active" data-lang="en" onclick="selectLang(this)">English</button>
      <button class="type-btn" data-lang="zh" onclick="selectLang(this)">中文</button>
    </div>
  </div>

  <div class="generate-row">
    <button class="btn-gen" id="btn-gen" onclick="generate()">生成 →</button>
    <button class="btn-clear" onclick="clearAll()">清空</button>
  </div>

  <div class="output-panel" id="output-panel">
    <div class="output-header">
      <span class="output-title" id="output-title">生成结果</span>
      <div class="output-actions">
        <button class="btn-sm" onclick="copyOutput()">复制</button>
      </div>
    </div>
    <div class="loading-area" id="loading-area">
      <div class="spinner"></div>
      <span class="loading-text" id="loading-text">AI 分析中...</span>
    </div>
    <div class="stats-row" id="stats-row"></div>
    <div class="tabs-bar" id="tabs-bar"></div>
    <div class="output-body" id="output-body"></div>
    <div class="error-area" id="error-area"></div>
  </div>

</div>

<script>
let selectedType = 'resume';
let selectedLang = 'en';
let selectedProvider = 'anthropic';
let tabData = {};
let activeTab = '';

const PROVIDERS = {
  anthropic: { label: 'Anthropic API Key', placeholder: 'sk-ant-...', model: 'claude-sonnet-4-20250514' },
  openai:    { label: 'OpenAI API Key',    placeholder: 'sk-...',     model: 'gpt-4o' },
  gemini:    { label: 'Google AI API Key', placeholder: 'AIza...',    model: 'gemini-2.0-flash' },
  deepseek:  { label: 'DeepSeek API Key',  placeholder: 'sk-...',     model: 'deepseek-chat' },
  grok:      { label: 'xAI API Key',       placeholder: 'xai-...',    model: 'grok-3' }
};

function selectProvider(el) {
  document.querySelectorAll('[data-provider]').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  selectedProvider = el.dataset.provider;
  const cfg = PROVIDERS[selectedProvider];
  document.getElementById('api-label').textContent = cfg.label;
  const input = document.getElementById('api-key');
  input.placeholder = cfg.placeholder;
  input.value = '';
  const s = document.getElementById('api-status');
  s.textContent = '未填写'; s.className = 'api-status unset';
}

function updateApiStatus() {
  const val = document.getElementById('api-key').value.trim();
  const el = document.getElementById('api-status');
  const valid = val.length > 20;
  el.textContent = valid ? '已填写' : '未填写';
  el.className = 'api-status ' + (valid ? 'set' : 'unset');
}

async function callAPI(apiKey, prompt) {
  const cfg = PROVIDERS[selectedProvider];
  if (selectedProvider === 'anthropic') {
    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01' },
      body: JSON.stringify({ model: cfg.model, max_tokens: 1500, messages: [{ role: 'user', content: prompt }] })
    });
    const d = await r.json();
    if (d.error) throw new Error(d.error.message);
    return (d.content || []).map(b => b.text || '').join('');
  }
  if (selectedProvider === 'gemini') {
    const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${cfg.model}:generateContent?key=${apiKey}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { maxOutputTokens: 1500 } })
    });
    const d = await r.json();
    if (d.error) throw new Error(d.error.message);
    return d.candidates?.[0]?.content?.parts?.[0]?.text || '';
  }
  const endpoints = {
    openai:   'https://api.openai.com/v1/chat/completions',
    deepseek: 'https://api.deepseek.com/chat/completions',
    grok:     'https://api.x.ai/v1/chat/completions'
  };
  const r = await fetch(endpoints[selectedProvider], {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
    body: JSON.stringify({ model: cfg.model, max_tokens: 1500, messages: [{ role: 'user', content: prompt }] })
  });
  const d = await r.json();
  if (d.error) throw new Error(d.error.message);
  return d.choices?.[0]?.message?.content || '';
}

function updateCount(id, countId) {
  document.getElementById(countId).textContent = document.getElementById(id).value.length + ' 字';
}

function selectType(el) {
  document.querySelectorAll('[data-type]').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  selectedType = el.dataset.type;
}

function selectLang(el) {
  document.querySelectorAll('[data-lang]').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  selectedLang = el.dataset.lang;
}

function clearAll() {
  document.getElementById('jd').value = '';
  document.getElementById('resume').value = '';
  document.getElementById('jd-count').textContent = '0 字';
  document.getElementById('resume-count').textContent = '0 字';
  document.getElementById('output-panel').style.display = 'none';
}

function copyOutput() {
  const text = tabData[activeTab] || document.getElementById('output-body').innerText;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.btn-sm');
    btn.textContent = '已复制 ✓';
    setTimeout(() => btn.textContent = '复制', 1800);
  });
}

function showTab(name) {
  activeTab = name;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
  document.getElementById('output-body').textContent = tabData[name] || '';
}

async function generate() {
  const apiKey = document.getElementById('api-key').value.trim();
  const jd = document.getElementById('jd').value.trim();
  const resume = document.getElementById('resume').value.trim();

  if (!apiKey) { alert('请先填写 API Key'); return; }
  if (!jd) { alert('请粘贴 JD'); return; }
  if (!resume) { alert('请粘贴简历'); return; }

  const panel = document.getElementById('output-panel');
  const loading = document.getElementById('loading-area');
  const body = document.getElementById('output-body');
  const error = document.getElementById('error-area');
  const stats = document.getElementById('stats-row');
  const tabs = document.getElementById('tabs-bar');
  const btn = document.getElementById('btn-gen');

  panel.style.display = 'block';
  loading.style.display = 'flex';
  body.textContent = ''; error.style.display = 'none';
  stats.style.display = 'none'; tabs.style.display = 'none';
  tabData = {}; btn.disabled = true;

  const langNote = selectedLang === 'en' ? 'Respond entirely in English.' : '请用中文回复。';
  const typeLabels = { resume: '简历优化', cover: 'Cover Letter', analysis: '匹配分析' };
  document.getElementById('output-title').textContent = typeLabels[selectedType];

  const loadingMsgs = {
    resume: ['解析 JD 关键词...', '对齐你的经历...', '优化 bullet points...'],
    cover: ['理解岗位背景...', '撰写求职信...', '润色语言...'],
    analysis: ['计算匹配度...', '识别技能缺口...', '生成建议...']
  };
  let mi = 0;
  document.getElementById('loading-text').textContent = loadingMsgs[selectedType][0];
  const timer = setInterval(() => {
    mi = (mi + 1) % loadingMsgs[selectedType].length;
    document.getElementById('loading-text').textContent = loadingMsgs[selectedType][mi];
  }, 1800);

  const prompts = {
    resume: `You are an expert resume writer specializing in fintech and data analytics roles. ${langNote}

Given the JD and the candidate's resume, rewrite the experience section with tailored content that:
1. Mirrors the JD's language and keywords naturally
2. Uses strong action verbs with quantified impact where possible
3. Highlights the most relevant skills for this specific role
4. Follows impact-first bullet point format

Structure your output as:
**Professional Summary** (2-3 sentences tailored to this role)

**Work Experience** (rewrite each role with 3-5 optimized bullets)

**Key Skills Match** (top 8 skills from the JD you possess)

JD:
${jd}

Resume:
${resume}`,

    cover: `You are an expert cover letter writer for fintech and data analytics roles. ${langNote}

Write a compelling, personalized cover letter that:
1. Opens with a strong hook showing you understand the company/role
2. Connects specific candidate experience to JD requirements naturally
3. Avoids robotic buzzword-heavy language — warm, professional tone
4. Is 3-4 paragraphs with a confident closing

Address to "Hiring Manager" if no name given.

JD:
${jd}

Resume:
${resume}`,

    analysis: `You are a career coach analyzing candidate fit. ${selectedLang === 'en' ? 'Respond in English.' : '用中文回复，但JSON字段名保持英文。'}

Analyze this application and return ONLY a raw JSON object — no markdown fences, no preamble:
{
  "score": <0-100>,
  "strength_count": <number>,
  "gap_count": <number>,
  "strengths": ["...", "...", "..."],
  "gaps": ["...", "...", "..."],
  "quick_wins": ["...", "...", "..."],
  "summary": "2-3 sentence overall assessment"
}

JD:
${jd}

Resume:
${resume}`
  };

  try {
    const text = await callAPI(apiKey, prompts[selectedType]);

    clearInterval(timer);
    loading.style.display = 'none';

    if (selectedType === 'analysis') {
      try {
        const clean = text.replace(/```json|```/g, '').trim();
        const p = JSON.parse(clean);
        const sc = p.score >= 75 ? 'good' : p.score >= 50 ? 'ok' : 'bad';
        stats.innerHTML = `
          <div class="stat-card"><div class="stat-label">匹配分数</div><div class="stat-value ${sc}">${p.score}</div></div>
          <div class="stat-card"><div class="stat-label">明确优势</div><div class="stat-value good">${p.strength_count}</div></div>
          <div class="stat-card"><div class="stat-label">技能缺口</div><div class="stat-value bad">${p.gap_count}</div></div>
        `;
        stats.style.display = 'grid';

        const summaryLabel = selectedLang === 'zh' ? '概览' : 'Summary';
        const strengthsLabel = selectedLang === 'zh' ? '优势' : 'Strengths';
        const gapsLabel = selectedLang === 'zh' ? '缺口' : 'Gaps';
        const winsLabel = selectedLang === 'zh' ? '快速提升' : 'Quick Wins';

        tabData[summaryLabel] = p.summary;
        tabData[strengthsLabel] = p.strengths.map((s, i) => `${i+1}. ${s}`).join('\n');
        tabData[gapsLabel] = p.gaps.map((g, i) => `${i+1}. ${g}`).join('\n');
        tabData[winsLabel] = p.quick_wins.map((w, i) => `${i+1}. ${w}`).join('\n');

        tabs.innerHTML = Object.keys(tabData).map(t =>
          `<button class="tab" data-tab="${t}" onclick="showTab('${t}')">${t}</button>`
        ).join('');
        tabs.style.display = 'flex';
        showTab(summaryLabel);
      } catch(e) {
        body.textContent = text;
      }
    } else {
      body.textContent = text;
    }

  } catch(err) {
    clearInterval(timer);
    loading.style.display = 'none';
    error.textContent = '请求失败：' + err.message;
    error.style.display = 'block';
  }

  btn.disabled = false;
}
</script>
</body>
</html>
